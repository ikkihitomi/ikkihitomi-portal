<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>お知らせ一覧｜一箕地区ポータルサイト</title>
  <meta name="description" content="一箕地区ポータルサイトのお知らせ・行事案内・活動報告の一覧です。">

  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <div id="commonHeader"></div>

  <main>

    <section class="sub-page-hero">
      <div class="section-inner">
        <p class="sub-label">NEWS</p>
        <h2>お知らせ一覧</h2>
        <p>一箕地区からのお知らせ・行事案内・活動報告を掲載しています。</p>
      </div>
    </section>

    <section class="section light">
      <div class="section-inner">

        <div class="news-filter">
          <label>
            キーワード検索
            <input type="text" id="keywordFilter" placeholder="例：健康、ゴルフ、防災">
          </label>

          <label>
            記事種類
            <select id="typeFilter">
              <option value="">すべて</option>
              <option value="news">お知らせ</option>
              <option value="event">行事案内</option>
              <option value="report">活動報告</option>
              <option value="bosai">防災・緊急</option>
              <option value="recruit">募集</option>
            </select>
          </label>

          <label>
            カテゴリ
            <select id="categoryFilter">
              <option value="">すべて</option>
            </select>
          </label>
        </div>

        <div id="newsList">
          <p>読み込み中...</p>
        </div>

      </div>
    </section>

  </main>

  <div id="commonFooter"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../admin/supabase-config.js"></script>
  <script src="../js/common.js"></script>
  <script src="../js/news-list.js"></script>

</body>

</html>
